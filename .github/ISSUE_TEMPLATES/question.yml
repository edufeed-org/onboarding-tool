name: ❓ Frage / Support
description: Du weißt nicht genau, ob ein Behavior ein Bug oder ein Feature ist, dann stelle doch mal eine Frage!
title: "[FRAGE]: "
labels: ["question"]
projects: ["edufeed-org/2"]

body:
  - type: markdown
    attributes:
      value: |
        Willkommen! 🤔
        
        Nutze dieses Template, wenn du dir unsicher bist, ob ein bestimmtes Verhalten 
        der Anwendung gewollt (Feature) oder ein Fehler (Bug) ist.

  - type: textarea
    id: observed-behavior
    attributes:
      label: Beobachtetes Verhalten
      description: |
        Beschreibe genau, was aktuell passiert.
        Was macht die Anwendung?
      placeholder: |
        Beispiel: "Wenn ich einer Seite bin, weiß ich nicht mehr weiter, weil..."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Was hättest du erwartet?
      description: |
        Was denkst du, sollte passieren?
        Oder was würdest du als intuitiveres Verhalten empfinden?
      placeholder: |
        Beispiel: "Ich hätte erwartet, dass ich X anklicken muss."


  - type: textarea
    id: context
    attributes:
      label: Kontext & Reproduktions-Schritte
      description: |
        Wie kann man das Verhalten reproduzieren?
        In welcher Situation tritt es auf?
      placeholder: |
        1. Anmelden
        2. Auf Seite "XYZ" gehen
        3. Auf Button "ABC" klicken
        4. Verhalten tritt auf

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        Optional: Zeige uns, wo du nicht weiterkommst
        Drag & Drop Screenshots hier herein
      placeholder: "Screenshots hier einfügen..."

  - type: markdown
    attributes:
      value: |
        ---
        **Danke für deine Frage!** 💡
        
        Unser Team oder die Community wird sich melden.
        
        **Weitere Hilfe:**
        - 💬 [GitHub Discussions](../../discussions) für allgemeine Diskussionen
        - 🐛 [Bug Report](?template=bug_report.yml) für technische Probleme