services:
  nostr-onboarding-keycloak:
    container_name: nostr-onboarding-keycloak
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Keycloak configuration
      - NEXT_PUBLIC_ENABLE_KEYCLOAK_SYNC=${NEXT_PUBLIC_ENABLE_KEYCLOAK_SYNC:-false}
      - NEXT_PUBLIC_KEYCLOAK_INSTANCE_URL=${NEXT_PUBLIC_KEYCLOAK_INSTANCE_URL}
      - NEXT_PUBLIC_KEYCLOAK_REALM=${NEXT_PUBLIC_KEYCLOAK_REALM}
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID}
      # Server-side Keycloak config
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      # Security
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    restart: unless-stopped